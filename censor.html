<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>이모지 가리개 ✦</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f7f6f3;--text:#222;--t2:#888;--t3:#bbb;--t4:#e2e0dc;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

.wrap{max-width:640px;margin:0 auto;padding:28px 20px 60px}
.top{margin-bottom:24px}
.logo{font-size:20px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--text)}
.sub{font-size:12px;color:var(--t2)}

.upload-area{border:2px dashed var(--t4);border-radius:var(--r);padding:40px 20px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:20px;position:relative;background:#fff}
.upload-area:hover{border-color:var(--t2)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-label{color:var(--t2);font-size:13px}
.upload-label span{font-size:28px;display:block;margin-bottom:8px}

.preview-wrap{position:relative;display:none;margin-bottom:20px;background:#fff;border-radius:var(--r);overflow:hidden}
.preview-wrap canvas{width:100%;height:auto;display:block}

.controls{display:none;gap:12px;flex-direction:column;margin-bottom:20px}
.controls.show{display:flex}
.row{display:flex;gap:8px;align-items:center}
.row label{font-size:12px;font-weight:600;min-width:60px;color:var(--t2)}
.row input[type=text]{flex:1;padding:9px 12px;border:1px solid var(--t4);border-radius:6px;font-family:inherit;font-size:13px;outline:none}
.row input[type=text]:focus{border-color:var(--text)}

.emoji-pick{display:flex;gap:6px;flex-wrap:wrap}
.emoji-opt{width:36px;height:36px;border-radius:8px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:.12s;background:#fff}
.emoji-opt:hover{background:#f0efec}
.emoji-opt.active{border-color:var(--text)}

.progress{display:none;align-items:center;gap:10px;padding:12px 0}
.progress.show{display:flex}
.progress-bar{flex:1;height:4px;background:var(--t4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width .3s;width:0}
.progress-text{font-size:11px;color:var(--t2);min-width:60px}

.found{display:none;padding:10px 0;font-size:12px;color:var(--t2)}
.found.show{display:block}
.found b{color:var(--text)}

.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:20px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-scan{background:var(--text);color:#fff}
.btn-scan:hover{opacity:.8}
.btn-scan:disabled{opacity:.5;cursor:default}
.btn-download{background:#fff;border:1px solid var(--t4);color:var(--text)}
.btn-download:hover{border-color:var(--text)}
.btn-reset{background:none;border:1px solid var(--t4);color:var(--t2)}
.btn-reset:hover{border-color:var(--text);color:var(--text)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;padding:10px 22px;border-radius:6px;font-size:12px;font-weight:500;transition:.3s;opacity:0;z-index:100;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.loading-lib{text-align:center;padding:20px;color:var(--t2);font-size:12px;display:none}
.loading-lib.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"><div class="logo-dot"></div>이모지 가리개</div>
    <div class="sub">캡쳐에서 특정 단어를 이모지로 가려요</div>
  </div>

  <div class="loading-lib" id="lib-loading">⏳ OCR 엔진 로딩 중...</div>

  <div class="upload-area" id="upload-area">
    <input type="file" accept="image/*" id="file-input" onchange="loadImage(this)"/>
    <div class="upload-label"><span>📷</span>이미지를 올려주세요</div>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls" id="controls">
    <div class="row">
      <label>단어 1</label>
      <input type="text" id="word1" placeholder="예: 랙시"/>
    </div>
    <div class="row">
      <label>단어 2</label>
      <input type="text" id="word2" placeholder="예: 다른 단어 (선택)"/>
    </div>
    <div class="row">
      <label>이모지</label>
      <div class="emoji-pick" id="emoji-pick"></div>
    </div>
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-text" id="progress-text">0%</span>
    </div>
    <div class="found" id="found"></div>
    <div class="btn-row">
      <button class="btn btn-scan" id="scan-btn" onclick="doScan()">🔍 스캔 & 가리기</button>
      <button class="btn btn-download" id="dl-btn" onclick="download()" style="display:none">📥 저장</button>
      <button class="btn btn-reset" onclick="reset()">초기화</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Load Tesseract.js dynamically ──
let tessReady=false;
(function loadTess(){
  const urls=[
    'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js',
    'https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js'
  ];
  let i=0;
  function tryNext(){
    if(i>=urls.length){toast('OCR 엔진 로드 실패');return}
    const s=document.createElement('script');
    s.src=urls[i];
    s.onload=()=>{tessReady=true;document.getElementById('lib-loading').classList.remove('show')};
    s.onerror=()=>{i++;tryNext()};
    document.head.appendChild(s);
  }
  document.getElementById('lib-loading').classList.add('show');
  tryNext();
})();

// ── Emoji Picker ──
const EMOJIS=['⬛','⭐','❤️','🔥','🌸','💀','🍀','🎵','✨','🐱','🐶','💜','🩷','🖤','😀'];
let selectedEmoji='⬛';
const ep=document.getElementById('emoji-pick');
EMOJIS.forEach(e=>{
  const d=document.createElement('div');
  d.className='emoji-opt'+(e===selectedEmoji?' active':'');
  d.textContent=e;
  d.onclick=()=>{
    selectedEmoji=e;
    ep.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
    if(ocrData)applyCensor();
  };
  ep.appendChild(d);
});

let origImg=null,ocrData=null;

function loadImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img;ocrData=null;
      const canvas=document.getElementById('canvas');
      canvas.width=img.width;canvas.height=img.height;
      canvas.getContext('2d').drawImage(img,0,0);
      document.getElementById('preview-wrap').style.display='block';
      document.getElementById('upload-area').style.display='none';
      document.getElementById('controls').classList.add('show');
      document.getElementById('dl-btn').style.display='none';
      document.getElementById('found').classList.remove('show');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function doScan(){
  const w1=document.getElementById('word1').value.trim();
  const w2=document.getElementById('word2').value.trim();
  if(!w1&&!w2){toast('가릴 단어를 입력해주세요');return}
  if(!origImg){toast('이미지를 먼저 올려주세요');return}
  if(!tessReady){toast('OCR 엔진 로딩 중... 잠시 기다려주세요');return}

  const btn=document.getElementById('scan-btn');
  btn.disabled=true;btn.textContent='스캔 중...';
  const prog=document.getElementById('progress');
  const fill=document.getElementById('progress-fill');
  const ptxt=document.getElementById('progress-text');
  prog.classList.add('show');
  fill.style.width='0%';ptxt.textContent='준비 중...';

  try{
    const result=await Tesseract.recognize(origImg,'kor+eng',{
      logger:m=>{
        if(m.progress!==undefined){
          const p=Math.round(m.progress*100);
          fill.style.width=p+'%';
          ptxt.textContent=m.status==='recognizing text'?p+'%':(m.status||'');
        }
      }
    });
    ocrData=result.data;
    fill.style.width='100%';ptxt.textContent='완료!';
    applyCensor();
  }catch(e){
    toast('OCR 실패: '+e.message);
    console.error(e);
  }
  btn.disabled=false;btn.textContent='🔍 스캔 & 가리기';
}

function applyCensor(){
  if(!origImg||!ocrData)return;
  const w1=document.getElementById('word1').value.trim().toLowerCase();
  const w2=document.getElementById('word2').value.trim().toLowerCase();
  const searchWords=[w1,w2].filter(Boolean);
  if(!searchWords.length)return;

  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  ctx.drawImage(origImg,0,0);

  let count=0;

  function coverBox(x,y,bw,bh){
    const pad=4;
    ctx.fillStyle='#fff';
    ctx.fillRect(x-pad,y-pad,bw+pad*2,bh+pad*2);
    const fontSize=Math.max(bh+4,18);
    ctx.font=fontSize+'px serif';
    ctx.textBaseline='top';
    const emojiW=ctx.measureText(selectedEmoji).width||fontSize;
    ctx.save();ctx.beginPath();ctx.rect(x-pad,y-pad,bw+pad*2,bh+pad*2);ctx.clip();
    for(let i=0;i<Math.ceil((bw+pad*2)/emojiW)+1;i++){
      ctx.fillText(selectedEmoji,x-pad+i*emojiW,y-pad);
    }
    ctx.restore();
    count++;
  }

  // Word level
  (ocrData.words||[]).forEach(w=>{
    const txt=(w.text||'').toLowerCase().replace(/\s/g,'');
    searchWords.forEach(sw=>{
      if(txt.includes(sw.replace(/\s/g,''))){
        const bb=w.bbox;
        coverBox(bb.x0,bb.y0,bb.x1-bb.x0,bb.y1-bb.y0);
      }
    });
  });

  // Character level fallback
  if(count===0&&ocrData.symbols){
    const allSymbols=ocrData.symbols||[];
    const allText=allSymbols.map(s=>s.text||'').join('').toLowerCase();
    searchWords.forEach(sw=>{
      let idx=allText.indexOf(sw);
      while(idx>=0){
        const start=allSymbols[idx];
        const end=allSymbols[Math.min(idx+sw.length-1,allSymbols.length-1)];
        if(start?.bbox&&end?.bbox){
          coverBox(start.bbox.x0,start.bbox.y0,end.bbox.x1-start.bbox.x0,end.bbox.y1-start.bbox.y0);
        }
        idx=allText.indexOf(sw,idx+1);
      }
    });
  }

  const found=document.getElementById('found');
  found.innerHTML=count?'<b>'+count+'개</b> 찾아서 가렸어요 '+selectedEmoji:'단어를 찾지 못했어요 😢';
  found.classList.add('show');
  document.getElementById('dl-btn').style.display=count?'':'none';
}

function download(){
  const canvas=document.getElementById('canvas');
  const link=document.createElement('a');
  link.download='censored_'+Date.now()+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
  toast('저장됨!');
}

function reset(){
  origImg=null;ocrData=null;
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('upload-area').style.display='';
  document.getElementById('controls').classList.remove('show');
  document.getElementById('file-input').value='';
  document.getElementById('word1').value='';
  document.getElementById('word2').value='';
  document.getElementById('found').classList.remove('show');
  document.getElementById('progress').classList.remove('show');
  document.getElementById('dl-btn').style.display='none';
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
</script>
</body>
</html>
